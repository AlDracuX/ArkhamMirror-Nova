# =============================================================================
# SHATTERED - Code Quality Checks
# =============================================================================
# Runs on PRs and pushes to main. Catches issues before merge.
# =============================================================================

name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check packages/

      - name: Ruff format check
        run: ruff format packages/ --check

  python-test:
    name: Python Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shattered
          POSTGRES_PASSWORD: shattered  # pragma: allowlist secret
          POSTGRES_DB: shattered
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e packages/arkham-frame/
          # Install all shards in editable mode
          for shard in packages/arkham-shard-*/; do
            if [ -f "$shard/pyproject.toml" ]; then
              pip install -e "$shard" || true
            fi
          done

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://shattered:shattered@localhost:5432/shattered  # pragma: allowlist secret
        run: |
          pytest packages/ -v --tb=short \
            --cov=packages \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  pmat-quality:
    name: PMAT Quality Gate
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory — don't block PRs yet
    steps:
      - uses: actions/checkout@v4

      - name: Install PMAT
        run: |
          curl -sSf https://raw.githubusercontent.com/paiml/paiml-mcp-agent-toolkit/main/install.sh | sh \
            || cargo install pmat

      - name: PMAT repo score
        run: pmat repo-score

      - name: PMAT quality gate
        run: pmat quality-gate

      - name: PMAT complexity check
        run: pmat analyze complexity --project-path .

      - name: PMAT technical debt check
        run: pmat analyze satd --path .

  shell-lint:
    name: Shell UI Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arkham-shard-shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/arkham-shard-shell/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format

      - name: TypeScript build
        run: npm run build
