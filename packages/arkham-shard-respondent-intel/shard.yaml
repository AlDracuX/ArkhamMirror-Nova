# RespondentIntel Shard - Respondent Intel
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: respondent-intel
version: "0.1.0"
description: Corporate structure and respondent background intelligence
entry_point: arkham_shard_respondent_intel:RespondentIntelShard
api_prefix: /api/respondent-intel
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Analysis
  order: 40
  icon: UserSearch
  label: Respondent Intel
  route: /respondent-intel
  badge_endpoint: /api/respondent-intel/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - respondent.profile.updated
    - respondent.connection.discovered
  subscribes:
    - entities.extracted
    - ingest.document.processed

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
