[project]
name = "arkham-shard-respondent-intel"
version = "0.1.0"
description = "Corporate structure and respondent background intelligence"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
respondent-intel = "arkham_shard_respondent_intel:RespondentIntelShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
