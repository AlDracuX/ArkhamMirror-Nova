# Disclosure Shard - Disclosure
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: disclosure
version: "0.1.0"
description: Disclosure request and gap tracker
entry_point: arkham_shard_disclosure:DisclosureShard
api_prefix: /api/disclosure
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Litigation
  order: 16
  icon: FileSearch
  label: Disclosure
  route: /disclosure
  badge_endpoint: /api/disclosure/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - disclosure.item.created
    - disclosure.item.updated
    - disclosure.item.deleted
  subscribes: []

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
