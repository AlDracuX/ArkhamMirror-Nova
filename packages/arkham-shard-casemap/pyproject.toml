[project]
name = "arkham-shard-casemap"
version = "0.1.0"
description = "Legal case theory mapping with evidence linkage shard for ArkhamFrame"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
casemap = "arkham_shard_casemap:CasemapShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
