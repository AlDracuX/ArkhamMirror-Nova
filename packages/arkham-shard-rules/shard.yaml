# Rules Shard - Rules
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: rules
version: "0.1.0"
description: Procedural rules and deadline engine
entry_point: arkham_shard_rules:RulesShard
api_prefix: /api/rules
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: System
  order: 17
  icon: BookOpen
  label: Rules
  route: /rules
  badge_endpoint: /api/rules/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - rules.breach.detected
  subscribes:
    - deadlines.created
    - documents.processed

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
