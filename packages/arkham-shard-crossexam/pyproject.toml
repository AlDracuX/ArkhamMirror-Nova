[project]
name = "arkham-shard-crossexam"
version = "0.1.0"
description = "Cross-examination question trees and impeachment sequences"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
crossexam = "arkham_shard_crossexam:CrossExamShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
