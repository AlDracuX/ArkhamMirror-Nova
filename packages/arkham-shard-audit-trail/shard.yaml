# AuditTrail Shard - Audit Trail
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: audit-trail
version: "0.1.0"
description: Immutable system action log
entry_point: arkham_shard_audit_trail:AuditTrailShard
api_prefix: /api/audit-trail
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: System
  order: 95
  icon: ScrollText
  label: Audit Trail
  route: /audit-trail
  badge_endpoint: /api/audit-trail/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - audit.export.recorded
  subscribes:
    - "*"

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
