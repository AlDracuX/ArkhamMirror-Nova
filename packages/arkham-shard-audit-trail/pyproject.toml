[project]
name = "arkham-shard-audit-trail"
version = "0.1.0"
description = "Immutable system action log"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
audit-trail = "arkham_shard_audit_trail:AuditTrailShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
