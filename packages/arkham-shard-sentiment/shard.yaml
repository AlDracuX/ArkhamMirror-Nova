# Sentiment Shard - Sentiment
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: sentiment
version: "0.1.0"
description: Tone and language pattern analyzer
entry_point: arkham_shard_sentiment:SentimentShard
api_prefix: /api/sentiment
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Analysis
  order: 37
  icon: HeartPulse
  label: Sentiment
  route: /sentiment
  badge_endpoint: /api/sentiment/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - sentiment.analysis.created
  subscribes:
    - documents.processed
    - comms.thread.reconstructed

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
