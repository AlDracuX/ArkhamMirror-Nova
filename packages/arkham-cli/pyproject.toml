[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arkham-cli"
version = "0.1.0"
description = "CLI for SHATTERED litigation analysis platform"
requires-python = ">=3.10"
dependencies = ["click>=8.0", "rich>=13.0", "requests>=2.28"]

[project.scripts]
shattered = "arkham_cli.cli:main"
