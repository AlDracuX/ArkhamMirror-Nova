# Skeleton Shard - Skeleton
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: skeleton
version: "0.1.0"
description: Legal argument and submission builder
entry_point: arkham_shard_skeleton:SkeletonShard
api_prefix: /api/skeleton
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Export
  order: 52
  icon: Scale
  label: Skeleton
  route: /skeleton
  badge_endpoint: /api/skeleton/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - skeleton.item.created
    - skeleton.item.updated
    - skeleton.item.deleted
  subscribes: []

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
