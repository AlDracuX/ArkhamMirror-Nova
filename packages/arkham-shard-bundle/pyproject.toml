[project]
name = "arkham-shard-bundle"
version = "0.1.0"
description = "Tribunal hearing bundle builder"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
bundle = "arkham_shard_bundle:BundleShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
