# Bundle Shard - Bundle
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: bundle
version: "0.1.0"
description: Tribunal hearing bundle builder
entry_point: arkham_shard_bundle:BundleShard
api_prefix: /api/bundle
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Export
  order: 55
  icon: BookCopy
  label: Bundle
  route: /bundle
  badge_endpoint: /api/bundle/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - bundle.item.created
    - bundle.item.updated
    - bundle.item.deleted
  subscribes: []

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
