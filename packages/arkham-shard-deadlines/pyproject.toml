[project]
name = "arkham-shard-deadlines"
version = "0.1.0"
description = "Legal deadline tracking with urgency scoring shard for ArkhamFrame"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
    "icalendar>=5.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
deadlines = "arkham_shard_deadlines:DeadlinesShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
