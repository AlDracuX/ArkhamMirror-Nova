# BurdenMap Shard - Burden Map
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: burden-map
version: "0.1.0"
description: Burden of proof element tracker
entry_point: arkham_shard_burden_map:BurdenMapShard
api_prefix: /api/burden-map
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Analysis
  order: 32
  icon: Scale
  label: Burden Map
  route: /burden-map
  badge_endpoint: /api/burden-map/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - burden-map.item.created
    - burden-map.item.updated
    - burden-map.item.deleted
  subscribes: []

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
