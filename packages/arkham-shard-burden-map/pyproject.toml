[project]
name = "arkham-shard-burden-map"
version = "0.1.0"
description = "Burden of proof element tracker"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
burden-map = "arkham_shard_burden_map:BurdenMapShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
