[project]
name = "arkham-shard-comparator"
version = "0.1.0"
description = "Equality Act s.13/s.26 treatment comparison matrix"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "arkham-frame>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "black", "mypy"]

[project.entry-points."arkham.shards"]
comparator = "arkham_shard_comparator:ComparatorShard"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
