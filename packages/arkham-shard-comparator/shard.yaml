# Comparator Shard - Comparator
# Production Manifest v1.0
# Compliant with shard_manifest_schema_prod.md

name: comparator
version: "0.1.0"
description: Equality Act s.13/s.26 treatment comparison matrix
entry_point: arkham_shard_comparator:ComparatorShard
api_prefix: /api/comparator
requires_frame: ">=0.1.0"

# Navigation - Shell integration
navigation:
  category: Analysis
  order: 34
  icon: GitCompare
  label: Comparator
  route: /comparator
  badge_endpoint: /api/comparator/items/count
  badge_type: count
  sub_routes: []

# Dependencies - Frame service names
dependencies:
  services:
    - database
    - events
  optional:
    - llm
    - vectors
  shards: []

# Capabilities
capabilities:
  - item_management
  - data_export

# Events - Format: {shard}.{entity}.{action}
events:
  publishes:
    - comparator.comparator.created
    - comparator.incident.created
    - comparator.treatment.mapped
    - comparator.divergence.found
  subscribes: []

# State Management
state:
  strategy: url
  url_params:
    - itemId
    - tab
    - view
  local_keys: []

# UI Configuration
ui:
  has_custom_ui: true
