# =============================================================================
# SHATTERED - Root Project Configuration
# =============================================================================
# Tooling-only config for the monorepo. Individual shards have their own
# pyproject.toml for package metadata and dependencies.
# =============================================================================

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["packages"]
exclude = [
    "node_modules",
    ".git",
    "__pycache__",
    "*.egg-info",
    "dist",
    "build",
    "data_silo",
    "DataSilo",
    "venv",
    ".venv",
]

[tool.ruff.lint]
# Start lenient — catch real bugs, not style nitpicks
# E: pycodestyle errors, F: pyflakes, W: pycodestyle warnings
# I: isort, UP: pyupgrade, B: flake8-bugbear, SIM: flake8-simplify
select = ["E", "F", "W", "I", "B"]
# UP (pyupgrade) disabled for now — 3000+ cosmetic issues in existing code.
# Enable after running `ruff check --select UP --fix` in a dedicated cleanup PR.
ignore = [
    "E501",   # line too long — handled by formatter
    "E402",   # module level import not at top — common in shards with conditional imports
    "E711",   # comparison to None — SQLAlchemy uses this pattern
    "E712",   # comparison to True/False — SQLAlchemy uses this pattern
    "B008",   # function call in default argument — FastAPI Depends() pattern
    "B904",   # raise without from — too noisy for existing code
    "F401",   # unused imports — too many in existing __init__.py re-exports
    "F841",   # unused variable — 46 in existing code, fix incrementally
    "E741",   # ambiguous variable name (l, O, I) — 8 in existing code
    "E701",   # multiple statements on one line — 8 in existing code
    "B007",   # unused loop variable — 16 in existing code, use _ prefix
    "B905",   # zip without strict= — 7 in existing code
    "B027",   # empty method in abstract class — 1 in existing code
    "E722",   # bare except — 7 in existing code, should use Exception
    "E731",   # lambda assignment — 4 in existing code
    "F821",   # undefined name — 5 in existing code (likely runtime-resolved)
    "W291",   # trailing whitespace — handled by formatter
    "W292",   # no newline at end of file — handled by formatter
    "W293",   # whitespace before ':' — handled by formatter
]
# TODO: Remove F841, E741, E701, B007, B905, E722, E731, F821 after cleanup PR
# These represent ~80 real issues in existing code. Fix incrementally.

[tool.ruff.lint.isort]
known-first-party = ["arkham_frame"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths = ["packages"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short --import-mode=importlib"
pythonpath = [
    "packages/arkham-frame",
    "packages/arkham-shard-ach",
    "packages/arkham-shard-anomalies",
    "packages/arkham-shard-audit-trail",
    "packages/arkham-shard-bundle",
    "packages/arkham-shard-burden-map",
    "packages/arkham-shard-casemap",
    "packages/arkham-shard-chain",
    "packages/arkham-shard-claims",
    "packages/arkham-shard-comms",
    "packages/arkham-shard-comparator",
    "packages/arkham-shard-contradictions",
    "packages/arkham-shard-costs",
    "packages/arkham-shard-credibility",
    "packages/arkham-shard-crossexam",
    "packages/arkham-shard-dashboard",
    "packages/arkham-shard-deadlines",
    "packages/arkham-shard-digest",
    "packages/arkham-shard-disclosure",
    "packages/arkham-shard-documents",
    "packages/arkham-shard-embed",
    "packages/arkham-shard-entities",
    "packages/arkham-shard-export",
    "packages/arkham-shard-graph",
    "packages/arkham-shard-ingest",
    "packages/arkham-shard-letters",
    "packages/arkham-shard-media-forensics",
    "packages/arkham-shard-ocr",
    "packages/arkham-shard-oracle",
    "packages/arkham-shard-packets",
    "packages/arkham-shard-parse",
    "packages/arkham-shard-patterns",
    "packages/arkham-shard-playbook",
    "packages/arkham-shard-projects",
    "packages/arkham-shard-provenance",
    "packages/arkham-shard-redline",
    "packages/arkham-shard-reports",
    "packages/arkham-shard-respondent-intel",
    "packages/arkham-shard-rules",
    "packages/arkham-shard-search",
    "packages/arkham-shard-sentiment",
    "packages/arkham-shard-settings",
    "packages/arkham-shard-skeleton",
    "packages/arkham-shard-strategist",
    "packages/arkham-shard-summary",
